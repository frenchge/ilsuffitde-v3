<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #4f5d40; margin: 0; min-height: 100vh; overflow: hidden; }
  .edge {
    position: absolute;
    bottom: -15px; left: -10px; right: -10px; height: 100px;
    background: #ece9e6;
    filter: url(#paint);
  }
</style>
</head>
<body>
<svg width="0" height="0">
  <filter id="paint">
    <feTurbulence type="fractalNoise" baseFrequency="0.05 0.5" numOctaves="3" result="noise" />
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="25" xChannelSelector="R" yChannelSelector="G" />
  </filter>
</svg>
<div class="edge"></div>
</body>
</html>
